<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Aesthetic">
    <link rel="apple-touch-icon" href="https://upload.wikimedia.org/wikipedia/commons/thumb/e/e6/Pink_heart.svg/512px-Pink_heart.svg.png">

    <title>Aesthetic Workout Routine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');
        
        :root {
            --bg-main: #fff0f5; 
            --text-main: #475569; 
            --accent-pink: #f472b6; 
        }
        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            font-family: 'Poppins', sans-serif;
            background-image: radial-gradient(#fbcfe8 1px, transparent 1px);
            background-size: 20px 20px;
            overscroll-behavior-y: none;
        }
        [contenteditable="true"] {
            transition: all 0.2s ease;
            border-bottom: 1px dashed transparent;
            -webkit-tap-highlight-color: transparent;
        }
        [contenteditable="true"]:hover {
            border-bottom: 1px dashed var(--accent-pink);
            cursor: text;
        }
        [contenteditable="true"]:focus {
            outline: none;
            background-color: #fdf2f8;
            border-bottom: 1px solid var(--accent-pink);
            border-radius: 4px;
            padding: 0 4px;
        }
        .hide-scroll::-webkit-scrollbar {
            display: none;
        }
        .hide-scroll {
            -ms-overflow-style: none;
            scrollbar-width: none;
            -webkit-overflow-scrolling: touch;
        }
        .aesthetic-shadow {
            box-shadow: 0 10px 25px -5px rgba(244, 114, 182, 0.15), 0 8px 10px -6px rgba(244, 114, 182, 0.1);
        }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8">

    <div class="max-w-4xl mx-auto">
        <header class="mb-8 text-center md:text-left bg-white p-6 rounded-3xl aesthetic-shadow border border-pink-50 mt-2">
            <h1 class="text-3xl md:text-4xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-pink-500 to-rose-400 mb-2">My Aesthetic Routine ✨</h1>
            <p class="text-slate-500 text-sm md:text-base font-light">Lower-body focused split. Toca cualquier texto para editarlo.</p>
        </header>

        <nav class="flex space-x-3 mb-8 overflow-x-auto hide-scroll pb-4 px-1" id="day-tabs"></nav>

        <main id="routine-container" class="space-y-5"></main>

        <div class="mt-12 text-center pb-8">
            <button onclick="resetRoutine()" class="text-xs text-pink-300 hover:text-pink-500 transition-colors bg-white px-4 py-2 rounded-full shadow-sm border border-pink-100">
                🤍 Restaurar rutina original
            </button>
        </div>
    </div>

    <script>
        const defaultRoutine = [
            {
                id: 'day1',
                title: 'Día 1: Glúteo & Femoral 🍑',
                exercises: [
                    { type: 'Base', name: 'Hip Thrust (Barra o Máquina)', sets: '4 x 8-10', rir: 'RIR 1-2', note: 'Empuja con los talones. Sostén 1 seg arriba.' },
                    { type: 'Base', name: 'Peso Muerto Rumano', sets: '4 x 8-10', rir: 'RIR 1-2', note: 'Lleva la cadera bien atrás, siente el estiramiento.' },
                    { type: 'Aislamiento', name: 'Curl Femoral (Tumbada o Sentada)', sets: '3 x 10-12', rir: 'RIR 0', note: 'Controla la bajada despacio.' },
                    { type: 'Metabólico', name: 'Sentadilla Búlgara', sets: '3 x 10-12 c/p', rir: 'RIR 1', note: 'Tronco inclinado hacia adelante para enfoque en glúteo.' },
                    { type: 'Aislamiento', name: 'Hiperextensiones en banco 45°', sets: '3 x 12-15', rir: 'RIR 0', note: 'Espalda encorvada, aprieta el glúteo al subir.' }
                ]
            },
            {
                id: 'day2',
                title: 'Día 2: Espalda & Bíceps 🦋',
                exercises: [
                    { type: 'Base', name: 'Jalón al Pecho', sets: '4 x 8-10', rir: 'RIR 1-2', note: 'Saca pecho al jalar, lleva la barra a la clavícula.' },
                    { type: 'Base', name: 'Remo con Mancuerna', sets: '3 x 10-12', rir: 'RIR 1-2', note: 'Lleva el codo hacia tu cadera.' },
                    { type: 'Postura', name: 'Facepull en Polea', sets: '3 x 12-15', rir: 'RIR 1', note: 'Clave para una postura bonita.' },
                    { type: 'Aislamiento', name: 'Curl de Bíceps Mancuernas', sets: '3 x 10-12', rir: 'RIR 0', note: 'Sube controlando, sin balancear.' },
                    { type: 'Aislamiento', name: 'Curl Martillo Polea', sets: '3 x 10-12', rir: 'RIR 0', note: 'Usa la cuerda.' }
                ]
            },
            {
                id: 'day3',
                title: 'Día 3: Quads Completo 🦵🏼',
                exercises: [
                    { type: 'Base', name: 'Sentadilla Libre o Hack Squat', sets: '4 x 8-10', rir: 'RIR 1-2', note: 'Baja profundo, mantén el core apretado.' },
                    { type: 'Base', name: 'Prensa de Piernas', sets: '3 x 10-12', rir: 'RIR 1', note: 'Pies en la parte baja para puro cuádriceps.' },
                    { type: 'Aislamiento', name: 'Extensión de Cuádriceps', sets: '4 x 12-15', rir: 'RIR 0', note: 'Mantén 1 segundo arriba. Quema mucho.' },
                    { type: 'Metabólico', name: 'Zancadas Caminando', sets: '3 x 12-15 pasos', rir: 'RIR 1', note: 'Paso normal con mancuernas.' },
                    { type: 'Aislamiento', name: 'Elevación de Talones', sets: '4 x 15-20', rir: 'RIR 0', note: 'Máximo estiramiento abajo.' }
                ]
            },
            {
                id: 'day4',
                title: 'Día 4: Pecho, Hombro & Tríceps ✨',
                exercises: [
                    { type: 'Base', name: 'Press Inclinado Mancuernas', sets: '3 x 8-10', rir: 'RIR 1-2', note: 'Tonifica la zona superior (escote).' },
                    { type: 'Base', name: 'Press de Hombros', sets: '3 x 10-12', rir: 'RIR 1-2', note: 'Baja hasta casi tocar los hombros.' },
                    { type: 'Aislamiento', name: 'Elevaciones Laterales', sets: '4 x 12-15', rir: 'RIR 0', note: 'Secreto para hombros redonditos.' },
                    { type: 'Aislamiento', name: 'Extensión Tríceps Polea', sets: '3 x 10-12', rir: 'RIR 0', note: 'Codos pegados al cuerpo.' },
                    { type: 'Aislamiento', name: 'Tríceps Copa', sets: '3 x 10-12', rir: 'RIR 0', note: 'Siente el estiramiento.' }
                ]
            },
            {
                id: 'day5',
                title: 'Día 5: Glúteo Aislado 🍒',
                exercises: [
                    { type: 'Aislamiento', name: 'Kickbacks en Polea', sets: '4 x 12-15 c/p', rir: 'RIR 0', note: 'Patada diagonal hacia atrás.' },
                    { type: 'Metabólico', name: 'Abducciones en Máquina', sets: '4 x 15-20', rir: 'RIR 0', note: 'Drop set en la última serie.' },
                    { type: 'Base', name: 'Step-Ups (Cajón)', sets: '3 x 10-12 c/p', rir: 'RIR 1', note: 'Controla totalmente la bajada lenta.' },
                    { type: 'Aislamiento', name: 'Glute Bridge a 1 pierna', sets: '3 x 12-15 c/p', rir: 'RIR 0', note: 'Mancuerna o disco sobre la cadera.' }
                ]
            }
        ];

        let currentData = [];
        let activeDayId = 'day1';

        function loadData() {
            try {
                const saved = localStorage.getItem('routineGirlfriendV2');
                if (saved) {
                    currentData = JSON.parse(saved);
                } else {
                    currentData = JSON.parse(JSON.stringify(defaultRoutine));
                }
            } catch (error) {
                // Si el iPhone bloquea el localStorage, usa los datos por defecto para que al menos se vea
                currentData = JSON.parse(JSON.stringify(defaultRoutine));
            }
        }

        function saveData() {
            try {
                localStorage.setItem('routineGirlfriendV2', JSON.stringify(currentData));
            } catch (error) {
                console.warn("No se pueden guardar los cambios en modo privado.");
            }
        }

        function resetRoutine() {
            if(confirm('¿Segura que quieres borrar tus cambios y reiniciar la rutina?')) {
                try {
                    localStorage.removeItem('routineGirlfriendV2');
                } catch(e) {}
                loadData();
                renderTabs();
                renderRoutine(activeDayId);
            }
        }

        function renderTabs() {
            const tabsContainer = document.getElementById('day-tabs');
            tabsContainer.innerHTML = '';

            currentData.forEach(day => {
                const btn = document.createElement('button');
                const isActive = day.id === activeDayId;
                
                btn.className = `px-5 py-2.5 rounded-full font-semibold whitespace-nowrap transition-all duration-300 ${
                    isActive 
                    ? 'bg-gradient-to-r from-pink-400 to-rose-400 text-white shadow-md transform scale-105' 
                    : 'bg-white text-slate-500 hover:bg-pink-50 border border-pink-100'
                }`;
                btn.innerText = day.title.split(':')[0]; 
                btn.onclick = () => {
                    activeDayId = day.id;
                    renderTabs();
                    renderRoutine(activeDayId);
                };
                tabsContainer.appendChild(btn);
            });
        }

        function renderRoutine(dayId) {
            const container = document.getElementById('routine-container');
            container.innerHTML = '';
            
            const dayIndex = currentData.findIndex(d => d.id === dayId);
            if (dayIndex === -1) return;
            const dayObj = currentData[dayIndex];

            const dayHeader = document.createElement('h2');
            dayHeader.className = 'text-2xl font-bold text-slate-700 mb-4 ml-2';
            dayHeader.innerText = dayObj.title;
            container.appendChild(dayHeader);

            dayObj.exercises.forEach((ex, exIndex) => {
                const card = document.createElement('div');
                card.className = 'bg-white rounded-3xl p-5 aesthetic-shadow border border-pink-50 flex flex-col md:flex-row gap-4 items-start md:items-center relative overflow-hidden';

                // Usamos un solo bloque de innerHTML para máxima compatibilidad con Safari iOS
                card.innerHTML = `
                    <div class="absolute left-0 top-0 bottom-0 w-1.5 bg-gradient-to-b from-pink-300 to-rose-300"></div>
                    <div class="w-full md:w-1/3 flex-shrink-0 pl-2">
                        <span class="text-[10px] font-bold uppercase tracking-wider px-2.5 py-1 rounded-full bg-pink-100 text-pink-600 mb-2.5 inline-block" 
                              contenteditable="true" 
                              onblur="updateField(${dayIndex}, ${exIndex}, 'type', this.innerText)">${ex.type}</span>
                        <div class="font-bold text-[1.1rem] leading-snug text-slate-800" 
                             contenteditable="true" 
                             onblur="updateField(${dayIndex}, ${exIndex}, 'name', this.innerText)">${ex.name}</div>
                    </div>
                    
                    <div class="w-full md:w-auto flex space-x-5 bg-pink-50/50 p-3.5 rounded-2xl flex-shrink-0 border border-pink-100/50">
                        <div>
                            <div class="text-[10px] text-slate-400 uppercase tracking-widest font-semibold mb-1">Series x Reps</div>
                            <div class="text-rose-500 font-bold text-lg" 
                                 contenteditable="true" 
                                 onblur="updateField(${dayIndex}, ${exIndex}, 'sets', this.innerText)">${ex.sets}</div>
                        </div>
                        <div class="w-px bg-pink-200"></div>
                        <div>
                            <div class="text-[10px] text-slate-400 uppercase tracking-widest font-semibold mb-1">Esfuerzo</div>
                            <div class="font-bold text-slate-700 text-lg" 
                                 contenteditable="true" 
                                 onblur="updateField(${dayIndex}, ${exIndex}, 'rir', this.innerText)">${ex.rir}</div>
                        </div>
                    </div>

                    <div class="w-full md:flex-grow">
                        <div class="text-[10px] text-pink-400 uppercase tracking-widest font-semibold mb-1">Nota Aesthetic 📝</div>
                        <div class="text-sm text-slate-500 font-light leading-relaxed bg-white/50" 
                             contenteditable="true" 
                             onblur="updateField(${dayIndex}, ${exIndex}, 'note', this.innerText)">${ex.note}</div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function updateField(dayIndex, exIndex, field, newValue) {
            if (!currentData[dayIndex] || !currentData[dayIndex].exercises[exIndex]) return;
            currentData[dayIndex].exercises[exIndex][field] = newValue.trim();
            saveData();
        }

        // Iniciar la app cuando todo el documento cargue
        document.addEventListener('DOMContentLoaded', () => {
            loadData();
            renderTabs();
            renderRoutine(activeDayId);
        });
    </script>
</body>
</html>
